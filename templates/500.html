<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Server Error | Canadian Weather App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <div class="container-fluid d-flex align-items-center justify-content-center min-vh-100">
        <div class="text-center">
            <div class="error-icon mb-4">
                <i class="fas fa-cloud-bolt display-1 text-danger"></i>
            </div>
            <h1 class="display-1 fw-bold text-danger">500</h1>
            <h2 class="mb-4">Server Error</h2>
            <p class="fs-5 text-muted mb-4">
                Looks like we're experiencing some stormy weather on our servers! 
                <br>Please try again in a few moments.
            </p>
            <div class="d-flex gap-3 justify-content-center">
                <button onclick="history.back()" class="btn btn-secondary">
                    <i class="fas fa-arrow-left me-2"></i>
                    Go Back
                </button>
                <a href="/" class="btn btn-primary">
                    <i class="fas fa-home me-2"></i>
                    Go Home
                </a>
                <button onclick="location.reload()" class="btn btn-outline-primary">
                    <i class="fas fa-redo me-2"></i>
                    Try Again
                </button>
            </div>
        </div>
    </div>
</body>
</html>
